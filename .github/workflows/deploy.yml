# =============================================================================
# GitHub Actions Workflow - Deploy to Production (Docker Mode)
# =============================================================================

name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync
      
      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='application/config/database.php' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/iloveemas/

      - name: SSH to server and deploy with Docker
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/iloveemas
            
            # Membangun dan menjalankan container
            docker compose up -d --build
            
            # Tunggu sejenak agar container benar-benar siap
            sleep 5
            
            # Atur izin folder log dan cache di dalam container
            docker exec ci3-iloveemas chmod -R 777 /var/www/html/application/logs
            docker exec ci3-iloveemas chmod -R 777 /var/www/html/application/cache
            
            # Bersihkan image yang menggantung (menghemat disk VPS)
            docker image prune -f
            
            echo "Status Container:"
            docker ps
          EOF
      
      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            echo "=== Check Container Status ==="
            docker ps -f name=ci3-iloveemas
            
            echo ""
            echo "=== Last Logs ==="
            docker logs --tail 20 ci3-iloveemas
          EOF

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Send failure notification
        run: echo "Deployment failed! Check GitHub Actions logs for details."