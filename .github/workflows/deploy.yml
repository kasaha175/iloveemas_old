name: Auto Deploy CI3 to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Files to VPS
        run: |
          # Menggunakan rsync untuk sinkronisasi file
          # --delete akan menghapus file di VPS yang sudah tidak ada di GitHub (sinkron total)
          rsync -avz --delete \
            --exclude '.git*' \
            --exclude '.github' \
            --exclude 'application/config/database.php' \
            --exclude 'application/logs/*' \
            --exclude 'application/cache/*' \
            . /var/www/iloveemas/

      - name: Fix Permissions
        run: |
          # Memastikan CodeIgniter bisa menulis log dan cache
          chmod -R 777 /var/www/iloveemas/application/logs
          chmod -R 777 /var/www/iloveemas/application/cache
          echo "Deployment Berhasil dan Otomatis!"
