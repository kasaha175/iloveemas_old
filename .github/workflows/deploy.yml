name: Auto Deploy CI3 to VPS

on:
  push:
    branches:
      - master # Pastikan kamu push ke branch master

jobs:
  deploy:
    runs-on: self-hosted # Ini akan otomatis mendeteksi runner di VPS kamu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Files to VPS
        run: |
          # Pastikan rsync terinstall di VPS. 
          # Kita exclude logs, cache, dan config DB agar data di VPS tidak hilang.
          rsync -avz --exclude '.git*' \
                    --exclude '.github' \
                    --exclude 'application/config/database.php' \
                    --exclude 'application/logs/*' \
                    --exclude 'application/cache/*' \
                    --delete \
                    . /var/www/iloveemas/

      - name: Fix Permissions
        run: |
          chmod -R 777 /var/www/iloveemas/application/logs
          chmod -R 777 /var/www/iloveemas/application/cache
          echo "Deployment Berhasil!"
