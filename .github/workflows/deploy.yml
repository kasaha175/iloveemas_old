name: Auto Deploy CI3 to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    # Kita gunakan label paling dasar agar pasti terbaca oleh runner manapun yang aktif
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Files to VPS
        run: |
          # Sinkronisasi file ke folder tujuan
          rsync -avz --exclude '.git*' \
                    --exclude '.github' \
                    --exclude 'application/config/database.php' \
                    --exclude 'application/logs/*' \
                    --exclude 'application/cache/*' \
                    --delete \
                    . /var/www/iloveemas/

      - name: Fix Permissions
        run: |
          # Pastikan folder log dan cache bisa ditulisi oleh PHP
          chmod -R 777 /var/www/iloveemas/application/logs
          chmod -R 777 /var/www/iloveemas/application/cache
          echo "Deployment Selesai!"
