name: Auto Deploy CI3 to VPS

on:
  push:
    branches:
      - master # Triggers otomatis setiap push ke branch master

jobs:
  deploy:
    runs-on: self-hosted # Menggunakan runner yang baru kita instal (vps-iloveemas)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Files to VPS
        run: |
          # Menggunakan rsync dengan flag -o dan -g untuk menjaga kepemilikan file
          # Mengecualikan config database agar tidak tertimpa settingan produksi
          rsync -avz --delete \
            --exclude '.git*' \
            --exclude '.github' \
            --exclude 'application/config/database.php' \
            --exclude 'application/logs/*' \
            --exclude 'application/cache/*' \
            . /var/www/iloveemas/

      - name: Fix Permissions
        run: |
          # Pastikan folder log dan cache bisa ditulisi oleh PHP 7.4
          # Menggunakan sudo jika diperlukan (pastikan user ile_stg punya akses sudo)
          chmod -R 777 /var/www/iloveemas/application/logs
          chmod -R 777 /var/www/iloveemas/application/cache
          echo "Deployment Berhasil dan Otomatis!"
