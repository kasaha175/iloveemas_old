# =============================================================================
# GitHub Actions Workflow - Deploy to Production (Docker Mode)
# =============================================================================

name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync
      
      # ✅ SYNC (FIXED)
      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            -e "ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o PreferredAuthentications=publickey" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/iloveemas

      # ✅ DEPLOY DOCKER
      - name: SSH to server and deploy with Docker
        run: |
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o PreferredAuthentications=publickey ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            mkdir -p /var/www/iloveemas
            cd /var/www/iloveemas
            
            docker compose up -d --build
            
            sleep 5
            
            docker exec ci3-iloveemas chmod -R 777 /var/www/html/application/logs || true
            docker exec ci3-iloveemas chmod -R 777 /var/www/html/application/cache || true
            
            docker image prune -f
            
            echo "Status Container:"
            docker ps
          EOF
      
      # ✅ VERIFY
      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o PreferredAuthentications=publickey ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            echo "=== Check Container Status ==="
            docker ps -f name=ci3-iloveemas
            
            echo ""
            echo "=== Last Logs ==="
            docker logs --tail 20 ci3-iloveemas
          EOF

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Send failure notification
        run: echo "Deployment failed! Check GitHub Actions logs for details."