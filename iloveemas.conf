# =============================================================================
# Nginx Server Block - Reverse Proxy Configuration
# For iloveemas.com pointing to Docker container on port 8082
# =============================================================================

server {
    listen 80;
    server_name iloveemas.com www.iloveemas.com;

    # Redirect HTTP to HTTPS (uncomment if you have SSL)
    # return 301 https://$server_name$request_uri;

    # Access and error logs
    access_log /var/log/nginx/iloveemas_access.log;
    error_log /var/log/nginx/iloveemas_error.log;

    # Reverse proxy to Docker container
    location / {
        proxy_pass http://127.0.0.1:8082;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Pass headers
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Optional: Static files caching (if serving directly)
    # location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
    #     proxy_pass http://127.0.0.1:8082;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error pages (optional)
    # error_page 500 502 503 504 /50x.html;
    # location = /50x.html {
    #     root /usr/share/nginx/html;
    # }
}

